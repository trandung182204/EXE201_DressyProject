<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đơn của bạn - Xúng Xính</title>

  <link href="https://fonts.googleapis.com/css?family=Abril+Fatface|Forum|Open+Sans:400,600|Roboto:100,300,400,500,700"
    rel="stylesheet">

  <link rel="stylesheet" href="../assets/dist/style/elements.css">
  <link rel="stylesheet" href="../assets/dist/style/header.css">
  <link rel="stylesheet" href="../assets/dist/style/footer.css">
  <link rel="stylesheet" href="../assets/dist/style/blog.css">
  <link rel="stylesheet" href="../assets/dist/style/style.css">
  <link rel="stylesheet" href="../assets/dist/style/responsive.css">

  <link rel="stylesheet" href="assets/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css">

  <style>
    :root {
      --brand: #d0021b;
      --text: #1f1f1f;
      --muted: #777;
      --line: #eee;
      --bg: #faf7f4;
      --card: #fff;
      --shadow: 0 10px 25px rgba(0, 0, 0, .06);
      --radius: 14px;
    }

    body {
      background: var(--bg);
    }

    .orders-wrap {
      padding: 26px 0 40px;
    }

    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .page-title {
      margin: 0;
      font-family: "Abril Fatface", serif;
      letter-spacing: .2px;
      color: var(--text);
      font-size: 30px;
      line-height: 1.1;
    }

    .page-sub {
      font-family: "Open Sans", sans-serif;
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .count-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .7);
      box-shadow: var(--shadow);
      font-family: "Open Sans", sans-serif;
      font-size: 13px;
      color: #333;
      white-space: nowrap;
    }

    .count-chip i {
      color: var(--brand);
    }

    /* Tabs */
    .status-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0 16px;
    }

    .status-tabs button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .85);
      padding: 9px 14px;
      cursor: pointer;
      border-radius: 999px;
      font-family: "Open Sans", sans-serif;
      font-size: 13px;
      color: #333;
      transition: transform .08s ease, border-color .15s ease, background .15s ease, color .15s ease;
    }

    .status-tabs button:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 0, 0, .18);
    }

    .status-tabs button.active {
      border-color: rgba(208, 2, 27, .35);
      color: var(--brand);
      background: rgba(208, 2, 27, .06);
      font-weight: 700;
    }

    /* Cards */
    .list {
      display: grid;
      gap: 12px;
    }

    .order-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .order-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .order-id {
      font-family: "Open Sans", sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin: 0;
    }

    .order-date {
      font-family: "Open Sans", sans-serif;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 12px;
      line-height: 1;
      font-family: "Open Sans", sans-serif;
      background: #fff;
      color: #333;
      white-space: nowrap;
    }

    .pill.red {
      border-color: rgba(208, 2, 27, .35);
      color: var(--brand);
      background: rgba(208, 2, 27, .06);
    }

    .pill.green {
      border-color: rgba(21, 128, 61, .28);
      color: #15803d;
      background: rgba(21, 128, 61, .06);
    }

    .pill.gray {
      border-color: rgba(120, 120, 120, .25);
      color: #555;
      background: rgba(120, 120, 120, .06);
    }

    .order-total {
      font-family: "Open Sans", sans-serif;
      font-size: 14px;
      color: #333;
      margin-top: 4px;
    }

    .order-total strong {
      font-weight: 800;
      color: var(--text);
      font-size: 16px;
    }

    .ship-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px dashed rgba(0, 0, 0, .15);
      background: rgba(250, 247, 244, .6);
      font-family: "Open Sans", sans-serif;
      font-size: 13px;
      color: #333;
    }

    .ship-box .muted {
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: 170px;
    }

    .btn-view {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, .18);
      background: #fff;
      text-decoration: none;
      font-family: "Open Sans", sans-serif;
      font-size: 13px;
      color: #111;
      transition: transform .08s ease, border-color .15s ease;
      width: 100%;
      justify-content: center;
    }

    .btn-view:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 0, 0, .32);
      text-decoration: none;
      color: #111;
    }

    .btn-view.primary {
      border-color: rgba(208, 2, 27, .35);
      background: rgba(208, 2, 27, .06);
      color: var(--brand);
      font-weight: 800;
    }

    .empty-box {
      padding: 18px;
      border: 1px dashed rgba(0, 0, 0, .15);
      text-align: center;
      background: rgba(255, 255, 255, .7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-family: "Open Sans", sans-serif;
      color: var(--muted);
    }

    @media (max-width: 767px) {
      .page-title {
        font-size: 26px;
      }

      .order-card {
        grid-template-columns: 1fr;
      }

      .actions {
        align-items: stretch;
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>
  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('header-placeholder').innerHTML = html;
        if (typeof renderAuthHeader === "function") renderAuthHeader();
        if (typeof renderHeaderCart === "function") renderHeaderCart();
        if (typeof initHeaderDelegatedHandlers === "function") initHeaderDelegatedHandlers();
      })
      .catch(console.error);
  </script>

  <div class="container orders-wrap">
    <div class="page-head">
      <div>
        <h1 class="page-title">Đơn của bạn</h1>
        <div class="page-sub">Theo dõi đơn đang đặt, đang giao và lịch sử đơn hàng.</div>
      </div>

      <div class="count-chip" id="orders-count-chip" style="display:none;">
        <i class="fa fa-file-text-o"></i>
        <span id="orders-count">0</span>
      </div>
    </div>

    <div class="status-tabs" id="status-tabs">
      <button data-status="" class="active">Tất cả</button>
      <button data-status="PENDING">Đang đặt</button>
      <button data-status="SHIPPING">Đang giao</button>
      <button data-status="DELIVERED">Đã giao</button>
      <button data-status="COMPLETED">Hoàn thành</button>
      <button data-status="CANCELLED">Đã huỷ</button>
    </div>

    <div id="orders-list" class="list">
      <div class="empty-box"><i class="fa fa-circle-o-notch fa-spin"></i> Đang tải danh sách đơn...</div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script>
    fetch('footer.html')
      .then(r => r.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html)
      .catch(console.error);
  </script>

  <script src="../assets/dist/js/vendor/jquery-3.2.0.min.js"></script>
  <script src="../assets/dist/js/vendor/bootstrap.min.js"></script>
  <script src="../assets/dist/js/auth-header.js"></script>
  <script src="../assets/dist/js/vendor/jquery-3.2.0.min.js"></script>
	<script src="../assets/dist/js/vendor/bootstrap.min.js"></script>
	<script src="../assets/dist/js/vendor/countUp.js"></script>
	<script src="../assets/dist/js/vendor/owl.carousel.min.js"></script>
	<script src="../assets/dist/js/vendor/ion.rangeSlider.min.js"></script>
	<script src="../assets/dist/js/vendor/dateRangePicker.js"></script>
	<script src="../assets/dist/js/vendor/jquery.flexslider-min.js"></script>
	<script src="../assets/dist/js/vendor/jquery.nicescroll.min.js"></script>
	<script src="../assets/dist/js/vendor/select2.min.js"></script>
	<script src="../assets/dist/js/vendor/lightbox.min.js"></script>
	<script src="../assets/dist/js/vendor/jquery.smooth-scroll.js"></script>
	<script src="../assets/dist/js/custom.js"></script>

  <script>
    const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const API_BASE = isLocal ? "http://localhost:5135" : "";

    function getToken() {
      return localStorage.getItem("accessToken")
        || localStorage.getItem("token")
        || localStorage.getItem("jwt")
        || "";
    }

    function formatVND(n) {
      try { return new Intl.NumberFormat("vi-VN", { style: "currency", currency: "VND" }).format(n ?? 0); }
      catch { return (n ?? 0) + " VND"; }
    }

    function formatDateTime(iso) {
      try { return new Date(iso).toLocaleString("vi-VN"); }
      catch { return iso; }
    }

    function prettyStatus(s) {
      const t = (s || "").toUpperCase();
      const map = {
        PENDING: "Đang đặt",
        SHIPPING: "Đang giao",
        DELIVERED: "Đã giao",
        COMPLETED: "Hoàn thành",
        CANCELLED: "Đã huỷ"
      };
      return map[t] || (s || "-");
    }

    function statusPillClass(s) {
      const t = (s || "").toUpperCase();
      if (t === "COMPLETED" || t === "DELIVERED") return "green";
      if (t === "CANCELLED") return "gray";
      return "red";
    }

    function prettyPay(s) {
      const t = (s || "").toUpperCase();
      const map = {
        SUCCESS: "Đã thanh toán",
        PAID: "Đã thanh toán",
        PENDING: "Chờ thanh toán",
        FAILED: "Thanh toán lỗi",
        UNPAID: "Chưa thanh toán"
      };
      return map[t] || (s || "-");
    }

    function payPillClass(s) {
      const t = (s || "").toUpperCase();
      if (t === "SUCCESS" || t === "PAID") return "green";
      if (t === "FAILED") return "gray";
      return "red";
    }

    async function loadOrders(status = "") {
      const token = getToken();
      const wrap = document.getElementById("orders-list");
      const countChip = document.getElementById("orders-count-chip");
      const countEl = document.getElementById("orders-count");

      if (!token) {
        wrap.innerHTML = `<div class="empty-box">
          Bạn chưa đăng nhập. <a href="login.html">Đăng nhập</a> để xem đơn hàng.
        </div>`;
        countChip.style.display = "none";
        return;
      }

      wrap.innerHTML = `<div class="empty-box"><i class="fa fa-circle-o-notch fa-spin"></i> Đang tải...</div>`;

      const url = API_BASE + `/api/bookings/me` + (status ? `?status=${encodeURIComponent(status)}` : "");
      const res = await fetch(url, {
        headers: {
          "Accept": "application/json",
          "Authorization": "Bearer " + token
        }
      });

      if (!res.ok) {
        const text = await res.text();
        wrap.innerHTML = `<div class="empty-box">Không tải được đơn hàng. <br>${text}</div>`;
        countChip.style.display = "none";
        return;
      }

      const json = await res.json();
      const items = json?.data || [];

      if (items.length) {
        countChip.style.display = "inline-flex";
        countEl.textContent = `${items.length} đơn`;
      } else {
        countChip.style.display = "none";
      }

      if (!items.length) {
        wrap.innerHTML = `<div class="empty-box">Không có đơn nào.</div>`;
        return;
      }

      wrap.innerHTML = items.map(o => {
        const id = o.bookingId ?? o.BookingId;
        const createdAt = o.createdAt ?? o.CreatedAt;
        const bookingStatus = o.bookingStatus ?? o.BookingStatus;
        const paymentStatus = o.paymentStatus ?? o.PaymentStatus;
        const paymentMethod = o.paymentMethod ?? o.PaymentMethod;
        const total = o.totalPrice ?? o.TotalPrice;

        const rName = o.recipientName ?? o.RecipientName;
        const rPhone = o.recipientPhone ?? o.RecipientPhone;
        const rAddr = o.recipientAddress ?? o.RecipientAddress;

        return `
          <div class="order-card">
            <div>
              <div class="order-top">
                <div class="order-id">Đơn #${id}</div>
                <div class="order-date"><i class="fa fa-clock-o"></i> ${formatDateTime(createdAt)}</div>
              </div>

              <div class="meta-row">
                <span class="pill ${statusPillClass(bookingStatus)}">
                  <i class="fa fa-truck"></i> ${prettyStatus(bookingStatus)}
                </span>
                <span class="pill ${payPillClass(paymentStatus)}">
                  <i class="fa fa-credit-card"></i> ${prettyPay(paymentStatus)}
                </span>
                ${paymentMethod ? `<span class="pill"><i class="fa fa-bank"></i> ${paymentMethod}</span>` : ""}
              </div>

              <div class="order-total">
                Tổng tiền: <strong>${formatVND(total)}</strong>
              </div>

              ${(rName || rPhone || rAddr) ? `
                <div class="ship-box">
                  <div><span class="muted">Người nhận:</span> <strong>${rName || "-"}</strong></div>
                  <div><span class="muted">SĐT:</span> <strong>${rPhone || "-"}</strong></div>
                  <div><span class="muted">Địa chỉ:</span> <strong>${rAddr || "-"}</strong></div>
                </div>
              ` : ""}
            </div>

            <div class="actions">
              <a class="btn-view primary" href="my-order-detail.html?id=${encodeURIComponent(id)}">
                <i class="fa fa-eye"></i> Xem chi tiết
              </a>
            </div>
          </div>
        `;
      }).join("");
    }

    // tabs
    document.getElementById("status-tabs").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-status]");
      if (!btn) return;

      document.querySelectorAll("#status-tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      loadOrders(btn.getAttribute("data-status") || "").catch(console.error);
    });

    document.addEventListener("DOMContentLoaded", () => {
      loadOrders("").catch(console.error);
    });
  </script>
</body>

</html>
